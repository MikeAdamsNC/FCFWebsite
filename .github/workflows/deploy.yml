name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: fcf-website-prod
  REGION: us-east1
  SERVICE: fcf-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/212881521255/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gh-deployer@fcf-website-prod.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 5 \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe "$SERVICE" \
            --region "$REGION" --project "$PROJECT_ID" \
            --format='value(status.url)'
